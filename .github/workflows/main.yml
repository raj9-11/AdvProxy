name: Build MediaFlow Stub Resolver

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Resolver APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Scaffold Project Structure
        run: |
          mkdir -p android-tv-app/app/src/main/java/com/mediaflow/resolver
          mkdir -p android-tv-app/app/src/main/res/layout

      - name: Generate Android Manifest
        run: |
          cat << 'EOF' > android-tv-app/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:usesCleartextTraffic="true"
                  android:label="MediaFlow Resolver"
                  android:theme="@android:style/Theme.DeviceDefault.Dialog">
                  
                  <activity android:name=".MainActivity"
                      android:exported="true"
                      android:excludeFromRecents="true">
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="http" />
                          <data android:scheme="https" />
                          <data android:mimeType="video/*" />
                          <data android:mimeType="application/octet-stream" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate UI Layout
        run: |
          cat << 'EOF' > android-tv-app/app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:orientation="vertical"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:padding="30dp"
              android:gravity="center">
              <ProgressBar android:layout_width="wrap_content" android:layout_height="wrap_content" />
              <TextView android:id="@+id/status"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Resolving Link..."
                  android:textSize="18sp"
                  android:paddingTop="20dp" />
          </LinearLayout>
          EOF

      - name: Generate Resolver Logic (Java)
        run: |
          cat << 'EOF' > android-tv-app/app/src/main/java/com/mediaflow/resolver/MainActivity.java
          package com.mediaflow.resolver;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.TextView;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  Intent intent = getIntent();
                  if (intent.getData() != null) {
                      String startUrl = intent.getDataString();
                      new Thread(() -> {
                          try {
                              String currentUrl = startUrl;
                              boolean resolving = true;
                              
                              // THE RESOLVER LOOP: Follows redirects until it hits the final file
                              while (resolving) {
                                  HttpURLConnection conn = (HttpURLConnection) new URL(currentUrl).openConnection();
                                  conn.setInstanceFollowRedirects(false); // We want to see the "Location" header
                                  conn.setRequestMethod("HEAD");
                                  conn.setRequestProperty("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64)");
                                  conn.connect();
                                  
                                  int status = conn.getResponseCode();
                                  if (status >= 300 && status <= 308) {
                                      String location = conn.getHeaderField("Location");
                                      if (location != null) { currentUrl = location; } 
                                      else { resolving = false; }
                                  } else {
                                      resolving = false;
                                  }
                                  conn.disconnect();
                              }

                              final String finalUrl = currentUrl;
                              runOnUiThread(() -> {
                                  Intent playIntent = new Intent(Intent.ACTION_VIEW);
                                  playIntent.setDataAndType(Uri.parse(finalUrl), "video/*");
                                  startActivity(Intent.createChooser(playIntent, "Open Clean Link With..."));
                                  finish();
                              });
                          } catch (Exception e) {
                              runOnUiThread(() -> {
                                  ((TextView)findViewById(R.id.status)).setText("Error: " + e.getMessage());
                              });
                          }
                      }).start();
                  } else { finish(); }
              }
          }
          EOF

      - name: Build Gradle
        run: |
          cat << 'EOF' > android-tv-app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF
          cat << 'EOF' > android-tv-app/settings.gradle
          include ':app'
          EOF
          cat << 'EOF' > android-tv-app/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.mediaflow.resolver'
              compileSdk 34
              defaultConfig { applicationId "com.mediaflow.resolver"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          EOF

      - name: Compile Final APK
        run: |
          cd android-tv-app
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleDebug

      - name: Upload Stub Resolver APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaFlow-Stub-Resolver
          path: android-tv-app/app/build/outputs/apk/debug/app-debug.apk
